<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- Google Fonts -->
  <!-- display=swap  prevents invisible text while custom fonts load -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap">
  
  <title>Frontend Mentor | QR code component</title>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: hsl(212, 45%, 89%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
      gap: 1rem;
    }
    div {
      background-color: hsl(0, 0%, 100%);
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      max-width: 20rem;
    }
    img { width: 100%; border-radius: 0.6875rem; }
    h1 {
      font-size: 1.375rem;
      color: hsl(218, 44%, 22%);
      padding: 0 1rem;
      margin: 1rem 0 0.5rem;
    }
    p {
      font-size: 0.975rem;
      color: hsl(216, 15%, 48%);
      margin: 1rem 0.875rem 1.5rem 0.875rem;
    }
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div>
    <img src="./images/image-qr-code.png" alt="QR code" />
    <h1>Improve your front-end skills by building projects</h1>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Max Plummer</a>.
  </footer>
</body>
</html>
